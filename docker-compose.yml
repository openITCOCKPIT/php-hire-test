services:

  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    restart: unless-stopped
    volumes:
      - ./backend:/var/www/backend
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - recipes-network

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "4200:4200"
    command: >
      sh -c "
      npm install &&
      npm install -g @angular/cli &&
      ng serve --host 0.0.0.0 --poll 2000
      "
    networks:
      - recipes-network

  webserver:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - recipes-network

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: recipes_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: db_user
      MYSQL_PASSWORD: db_password
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - recipes-network

  mailhog:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - recipes-network

networks:
  recipes-network:

volumes:
  dbdata:
  frontend_node_modules: