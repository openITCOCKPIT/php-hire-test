# Single-origin front door (issue #18): serve the Angular SPA and proxy /api to
# the backend nginx, so the browser sees one origin and there is no CORS.
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # API requests are forwarded to the backend nginx (which runs the CakePHP app).
    # The full /api/... URI is passed through unchanged.
    location /api/ {
        proxy_pass http://nginx;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else is the SPA; unknown paths fall back to index.html so Angular
    # can handle client-side routing (deep links, refresh).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
