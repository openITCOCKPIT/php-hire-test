# nginx site config for the Recipe Collection JSON API.
# Document root is the CakePHP webroot; every non-file request is routed
# through the front controller (index.php), which is the standard CakePHP setup.
server {
    listen 80;
    server_name localhost;

    root /var/www/html/api/webroot;
    index index.php;

    # Serve real files directly, otherwise hand off to the front controller.
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # Pass PHP requests to the PHP-FPM container on port 9000.
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
