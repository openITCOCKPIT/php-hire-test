<h1 class="h3 mb-4">New Recipe</h1>

@if (submitError()) {
  <div class="alert alert-danger">{{ submitError() }}</div>
}

<form [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <div class="mb-3">
    <label for="title" class="form-label">Title</label>
    <input
      id="title"
      type="text"
      class="form-control"
      formControlName="title"
      [class.is-invalid]="form.get('title')?.invalid && form.get('title')?.touched"
    />
    <div class="invalid-feedback">Please enter a title (max 255 characters).</div>
  </div>

  <div class="mb-3">
    <label for="description" class="form-label">Description</label>
    <textarea id="description" rows="3" class="form-control" formControlName="description"></textarea>
  </div>

  <div class="row g-2 mb-3">
    <div class="col">
      <label for="temperature" class="form-label">Temperature (°C)</label>
      <input
        id="temperature"
        type="number"
        class="form-control"
        formControlName="temperature"
        [class.is-invalid]="form.get('temperature')?.invalid && form.get('temperature')?.touched"
      />
      <div class="invalid-feedback">0–500 °C.</div>
    </div>
    <div class="col">
      <label for="duration" class="form-label">Duration (min)</label>
      <input
        id="duration"
        type="number"
        class="form-control"
        formControlName="duration"
        [class.is-invalid]="form.get('duration')?.invalid && form.get('duration')?.touched"
      />
      <div class="invalid-feedback">0–1440 min.</div>
    </div>
  </div>

  <h2 class="h5">Ingredients</h2>
  <div formArrayName="ingredients">
    @for (group of ingredients.controls; track group; let i = $index) {
      <div class="row g-2 mb-2 align-items-start" [formGroupName]="i">
        <div class="col-5">
          <input
            type="text"
            class="form-control"
            placeholder="Name"
            formControlName="name"
            [class.is-invalid]="group.get('name')?.invalid && group.get('name')?.touched"
          />
        </div>
        <div class="col-3">
          <input
            type="number"
            step="0.01"
            class="form-control"
            placeholder="Amount"
            formControlName="amount"
            [class.is-invalid]="group.get('amount')?.invalid && group.get('amount')?.touched"
          />
        </div>
        <div class="col-3">
          <input
            type="text"
            class="form-control"
            placeholder="Unit"
            formControlName="unit"
            [class.is-invalid]="group.get('unit')?.invalid && group.get('unit')?.touched"
          />
        </div>
        <div class="col-1">
          <button
            type="button"
            class="btn btn-outline-danger w-100"
            (click)="removeIngredient(i)"
            [disabled]="ingredients.length === 1"
            aria-label="Remove ingredient"
          >
            &times;
          </button>
        </div>
      </div>
    }
  </div>

  <button type="button" class="btn btn-outline-secondary btn-sm mb-4" (click)="addIngredient()">
    + Add ingredient
  </button>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary" [disabled]="submitting()">
      @if (submitting()) {
        <span class="spinner-border spinner-border-sm me-1"></span> Saving…
      } @else {
        Save recipe
      }
    </button>
    <a routerLink="/" class="btn btn-link">Cancel</a>
  </div>
</form>
