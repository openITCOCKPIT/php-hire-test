<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" routerLink="/">{{ title() }}</a>

    <div class="navbar-search d-flex align-items-center ms-auto" [class.open]="searchOpen()">
      <input
        #searchInput
        type="search"
        class="form-control form-control-sm navbar-search-input"
        placeholder="Search recipes…"
        aria-label="Search recipes"
        [(ngModel)]="searchTerm"
        (ngModelChange)="onSearchInput()"
        (blur)="onSearchBlur()"
        (keyup.escape)="closeSearch()"
      />
      <button
        type="button"
        class="btn btn-outline-light btn-sm navbar-search-toggle d-flex align-items-center"
        aria-label="Search recipes"
        (click)="toggleSearch()"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path
            d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"
          />
        </svg>
      </button>
    </div>
  </div>
</nav>

<main class="container py-4">
  <router-outlet />
</main>
