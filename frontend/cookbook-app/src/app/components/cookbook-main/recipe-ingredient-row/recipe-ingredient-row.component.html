<div class="row cookbook-form-ingredient-row">
    <div class="col-4">
        <input class="form-control" [(ngModel)]="ingredient.ingredientName" [value]="ingredient.ingredientName" placeholder="Name der Zutat *">
    </div>

    <div class="col-3">
        <input class="form-control" [(ngModel)]="ingredient.unitOfMeasure" [value]="ingredient.unitOfMeasure" placeholder="Maßeinheit">
    </div>

    <div class="col-4">
        <input class="form-control" type="number" min="0" [(ngModel)]="ingredient.amount" [value]="ingredient.amount" placeholder="Menge *">
    </div>

    <div class="col-1">
        <i class="fa-solid fa-minus-circle fa-2xl add-icon" (click)="removeIngredient.emit(ingredient)" title="Zutat Löschen"></i>
    </div>
</div>
